<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Reunite</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Courier+Prime&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  :root {
    --ivory:#F4EEE4; --ink:#4A3D31; --brown:#5B4638; --soft:#6B5A4B; --faint:#A0907A; --gold:#B7864E;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background:var(--ivory); color:var(--ink); }
  body { min-height:100vh; display:flex; justify-content:center; -webkit-font-smoothing:antialiased; }
  .wrap { width:100%; max-width:620px; padding:14vh 28px 18vh; }
  .meta { font-family:'IBM Plex Mono',monospace; font-size:13px; letter-spacing:.08em; line-height:1.9; color:var(--soft); }
  .salutation { font-family:'Cormorant Garamond',serif; font-weight:600; font-size:34px; line-height:1.2; color:var(--brown); margin:28px 0 18px; }
  .body { font-family:'Courier Prime',monospace; font-size:16px; line-height:1.95; white-space:pre-wrap; color:var(--ink); }
  .star { margin-top:64px; text-align:center; color:var(--gold); font-size:20px; }
  .state { font-family:'IBM Plex Mono',monospace; font-size:13px; letter-spacing:.06em; color:var(--faint); }

  /* 缓缓浮现:一段段慢慢升起、淡入 —— 这一页的灵魂是"慢"。 */
  .reveal { opacity:0; transform:translateY(10px); animation:rise 2.6s cubic-bezier(.2,.6,.2,1) forwards; }
  .reveal.d1  { animation-delay:.2s; }
  .reveal.d1p { animation-delay:.7s; }
  .reveal.d1v { animation-delay:1.3s; }
  .reveal.d2  { animation-delay:2.2s; }
  .reveal.d3  { animation-delay:3.1s; }
  @keyframes rise { to { opacity:1; transform:translateY(0); } }

  /* ── Polaroid frame ── */
  .polaroid-wrap {
    /* Center inside the max-width column */
    display: flex;
    justify-content: center;
    margin: 24px 0 0;
  }

  .polaroid {
    --paper-bg: #FBF8F1;
    --paper-shadow:
      0 1px 2px rgba(13,13,13,.06),
      0 8px 24px rgba(13,13,13,.08),
      0 24px 48px rgba(13,13,13,.06);
    position: relative;
    background: var(--paper-bg);
    padding: 22px 22px 36px;
    box-shadow: var(--paper-shadow);
    /* Width: fits comfortably in 620px column with room to breathe */
    width: min(320px, 88vw);
  }

  .polaroid--photo { transform: rotate(-2deg); }
  .polaroid--video { transform: rotate(2deg); }

  /* Tape strip at the top */
  .polaroid-tape {
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%) rotate(-1deg);
    width: 64px;
    height: 18px;
    background: rgba(255,199,82,.32);
    border: 1px solid rgba(140,94,16,.12);
  }

  /* The photo/video window — 4:5 aspect ratio */
  .polaroid-window {
    position: relative;
    width: 100%;
    aspect-ratio: 4 / 5;
    overflow: hidden;
    background: #E8E0D4;
  }

  /* Film-grain overlay via inline SVG fractalNoise */
  .polaroid-window::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/></svg>");
    mix-blend-mode: overlay;
    opacity: 0.18;
  }

  /* The actual image or video inside the window */
  .polaroid-media {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: saturate(0.88) sepia(0.1) contrast(0.92) brightness(1.02);
  }

  /* Video: controls sit on top of the vintage filter; keep them reachable */
  .polaroid-media--video {
    /* Don't apply the same absolute positioning for video so controls show */
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: saturate(0.88) sepia(0.1) contrast(0.92) brightness(1.02);
  }
</style>
</head>
<body>
  <main class="wrap" id="root">
    <p class="state" id="state">Opening…</p>
  </main>

  <script>
    // 这两个都是公开值(anon key 本就随 app 公开),放这里安全。
    const SUPABASE_URL = 'https://vxvgcozpuerrjtoxwumi.supabase.co';
    const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4dmdjb3pwdWVycmp0b3h3dW1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzAyODQsImV4cCI6MjA5Njg0NjI4NH0.POL88HDZCOubSx-2b-i0HBP3CK7Sn72TZRzeKz-nuhk';

    function getToken() {
      const h = new URLSearchParams(location.hash.slice(1));
      return h.get('token') || new URLSearchParams(location.search).get('token');
    }
    function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
    // 只信任我们自己 Supabase 存储桶的链接,别的一律不渲染(纵深防御:就算 esc 漏了也挡得住)。
    function safeMediaUrl(u) { return (typeof u === 'string' && u.indexOf(SUPABASE_URL + '/storage/') === 0) ? u : null; }
    function fmtDate(d) {
      try { return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }); }
      catch (e) { return d; }
    }

    // Build a Polaroid block for a photo URL.
    // Returns an HTML string, or '' if url is falsy.
    function photoPolaroid(url) {
      if (!url) return '';
      // esc() the URL to prevent XSS via a malicious photo_url
      var safe = esc(url);
      return (
        '<div class="polaroid-wrap reveal d1p">' +
          '<figure class="polaroid polaroid--photo">' +
            '<div class="polaroid-tape"></div>' +
            '<div class="polaroid-window">' +
              '<img class="polaroid-media" src="' + safe + '" alt="A memory you sealed with this letter" loading="lazy" />' +
            '</div>' +
          '</figure>' +
        '</div>'
      );
    }

    // Build a Polaroid block for a video URL.
    // Returns an HTML string, or '' if url is falsy.
    function videoPolaroid(url) {
      if (!url) return '';
      var safe = esc(url);
      return (
        '<div class="polaroid-wrap reveal d1v">' +
          '<figure class="polaroid polaroid--video">' +
            '<div class="polaroid-tape"></div>' +
            '<div class="polaroid-window">' +
              '<video class="polaroid-media polaroid-media--video" src="' + safe + '" controls preload="metadata">' +
                'Your browser does not support HTML5 video.' +
              '</video>' +
            '</div>' +
          '</figure>' +
        '</div>'
      );
    }

    async function main() {
      const token = getToken();
      const root = document.getElementById('root');
      const state = document.getElementById('state');
      if (!token) { state.textContent = 'This link is missing its key.'; return; }
      try {
        const res = await fetch(SUPABASE_URL + '/rest/v1/rpc/reveal_letter', {
          method: 'POST',
          headers: { apikey: ANON, Authorization: 'Bearer ' + ANON, 'Content-Type': 'application/json' },
          body: JSON.stringify({ p_token: token }),
        });
        const rows = await res.json();
        if (!Array.isArray(rows) || rows.length === 0) {
          state.textContent = 'This letter is not ready yet, or the link is no longer valid.';
          return;
        }
        const letter = rows[0];

        // photo_url and video_url may be null/undefined — guard both.
        const photoHtml = photoPolaroid(safeMediaUrl(letter.photo_url));
        const videoHtml = videoPolaroid(safeMediaUrl(letter.video_url));

        root.innerHTML =
          '<div class="meta reveal d1">' + fmtDate(letter.deliver_on) + '<br>You sealed this, and asked it to find you today.</div>' +
          photoHtml +
          videoHtml +
          '<div class="salutation reveal d2">Dear future me,</div>' +
          '<div class="body reveal d3">' + esc(letter.body) + '</div>' +
          '<div class="star reveal d3">&#10022;</div>';
      } catch (e) {
        state.textContent = 'Something went wrong opening this letter.';
      }
    }
    main();
  </script>
</body>
</html>
