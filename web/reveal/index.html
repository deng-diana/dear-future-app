<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Reunite</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/tokens.css" />
<style>
  /* Local aliases bridging the token names used below to the shared tokens */
  :root {
    --brown: var(--brand-deep);   /* salutation — deepest ink */
    --soft:  var(--ink);          /* deliver-date, state text */
    --faint: var(--ink);          /* same */
    --wax:   var(--brand);        /* music button colour */
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background:var(--ivory); color:var(--ink); overflow-x:hidden; }
  body { min-height:100vh; display:flex; justify-content:center; -webkit-font-smoothing:antialiased; }
  .wrap { width:100%; max-width:620px; padding:14vh 28px 18vh; }

  /* ── Header splash stack ── */
  .header { text-align:center; }

  .header-seal { display:inline-block; }
  .header-seal img {
    width:auto;
    height:118px;            /* logo 更大 */
    display:block;
    filter:drop-shadow(0 2px 10px rgba(87,32,7,.18));
  }

  /* Pull the wordmark up to close the gap left by the seal PNG's transparent bottom padding */
  .header-wordmark {
    margin-top:-24px;
    display:flex;
    justify-content:center;
  }
  .header-wordmark img { width:124px; display:block; }  /* Reunite 更小 */

  .header-tagline {
    font-family:'Courier Prime',monospace;
    font-size:13px;
    letter-spacing:.07em;
    color:var(--ink);
    margin-top:16px;
  }

  .header-divider {
    display:flex;
    justify-content:center;
    margin-top:28px;          /* 分割线上方间距更大 */
  }
  .header-divider img { width:200px; display:block; }

  /* Delivery date — understated, just below the divider */
  .deliver-date {
    font-family:'Courier Prime',monospace;
    font-size:12px;
    letter-spacing:.08em;
    color:var(--soft);
    opacity:.75;
    text-align:center;
    margin-top:28px;          /* 分割线下方间距更大 */
  }

  /* Task 4: responsive font sizing */
  .body { font-family:'Courier Prime',monospace; font-size:clamp(15px, 4vw, 17px); line-height:1.95; white-space:pre-wrap; color:var(--ink); }

  /* ── Letter paper ──
     The written letter sits on its own warm sheet, lifted off the page with a
     soft shadow so it never visually blends into the header above it (this was
     the problem on text-only letters: the words ran straight into the date).
     Brand is "paper-first", so this is a real sheet of stationery — warm paper,
     faint grain, generous margins — not a software card. */
  .letter-paper {
    position: relative;
    max-width: 560px;
    margin: 24px auto 0;
    padding: clamp(34px, 6vw, 56px) clamp(20px, 4vw, 36px);
    background: linear-gradient(180deg, #FFFDF8 0%, #FFFBF2 100%);
    border: 1px solid rgba(102,79,54,.06);
    border-radius: 3px;            /* almost square corners — paper, not a UI card */
    box-shadow:
      0 1px 2px   rgba(102,79,54,.05),
      0 10px 28px rgba(102,79,54,.10),
      0 32px 60px rgba(102,79,54,.06);
  }
  /* Faint paper grain so the sheet reads as physical paper rather than a flat panel. */
  .letter-paper::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    border-radius: inherit;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='np'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23np)'/></svg>");
    mix-blend-mode: multiply;
    opacity: 0.05;
  }
  /* Keep the actual text above the grain layer. */
  .letter-paper .body { position: relative; z-index: 1; }

  .star { margin-top:48px; text-align:center; color:var(--gold); font-size:20px; }
  .state { font-family:'Courier Prime',monospace; font-size:13px; letter-spacing:.06em; color:var(--faint); }

  /* ── Staggered fade-in: elements rise up and fade in slowly ── */
  .reveal { opacity:0; transform:translateY(10px); animation:rise 2.6s cubic-bezier(.2,.6,.2,1) forwards; }
  .reveal.s0  { animation-delay:0s; }
  .reveal.d1  { animation-delay:.2s; }
  .reveal.d1a { animation-delay:.45s; }
  .reveal.d1b { animation-delay:.65s; }
  .reveal.d1c { animation-delay:.85s; }
  .reveal.d1p { animation-delay:.7s; }
  /* Each photo rises a beat after the one before it */
  .reveal.p0  { animation-delay:.7s; }
  .reveal.p1  { animation-delay:1.0s; }
  .reveal.p2  { animation-delay:1.3s; }
  .reveal.p3  { animation-delay:1.6s; }
  /* p4–p9 continue the cascade for the 5–10 photo pile */
  .reveal.p4  { animation-delay:1.85s; }
  .reveal.p5  { animation-delay:2.05s; }
  .reveal.p6  { animation-delay:2.25s; }
  .reveal.p7  { animation-delay:2.45s; }
  .reveal.p8  { animation-delay:2.65s; }
  .reveal.p9  { animation-delay:2.85s; }
  .reveal.d1v { animation-delay:1.9s; }
  .reveal.d2  { animation-delay:2.6s; }
  .reveal.d3  { animation-delay:3.4s; }
  /* Text-only letter (no photos, no video): the body shouldn't cold-wait for media
     that never arrives. JS picks this shorter delay when there's nothing above it. */
  .reveal.dtext { animation-delay:1.5s; }
  @keyframes rise { to { opacity:1; transform:translateY(0); } }

  /* ── Photo fan strip ── */
  /*
    Photos overlap each other like a hand-fanned set of prints.
    Negative margin pulls each photo under the previous one.
    z-index steps up so the rightmost photo sits on top (visible).
    transform-origin at bottom-center makes them fan naturally.
  */
  .photo-strip {
    display: flex;
    flex-wrap: nowrap;
    justify-content: center;
    align-items: flex-end;
    /* 顶部多留些空间:中间那张会向上抬起成扇形 */
    margin: 46px 0 0;
    overflow: visible;     /* 扇形抬起不被裁切(窄屏由 @media 换行兜底) */
    padding-bottom: 28px;  /* room for shadows below the photos */
    /* Task 1: horizontal padding so rotated corners don't clip page edge */
    padding-left: 8px;
    padding-right: 8px;
  }

  /* ── Polaroid frame (shared base) ── */
  .polaroid-wrap {
    display: flex;
    justify-content: center;
    margin: 24px 0 0;
  }

  /*
    Warm, soft, multi-layer shadow — inspired by itinerary.html's spot-polaroid.
    rgba(102,79,54, …) is a warm brown-sepia tone that sits gently on ivory.
    Three layers: a sharp near shadow for presence, a mid diffuse for lift,
    a far airy bloom. No harsh black.
  */
  .polaroid {
    --paper-bg: #FFFFFF;
    --warm-shadow:
      0 1px 2px  rgba(102,79,54,.06),
      0 8px 22px rgba(102,79,54,.10),
      0 24px 48px rgba(102,79,54,.07);
    position: relative;
    background: var(--paper-bg);
    padding: 14px 14px 32px;
    box-shadow: var(--warm-shadow);
    /* GPU compositing hint — keeps rotated content crisp, prevents sub-pixel blur */
    transition: transform 420ms cubic-bezier(.25,.8,.25,1),
                box-shadow 420ms cubic-bezier(.25,.8,.25,1);
  }

  /* Photo polaroids: bigger than before, overlapping fan */
  .polaroid--photo {
    width: min(170px, 46vw);
    padding: 12px 12px 30px;
    /* Negative margin creates the overlap — adjacent photos tuck under each other */
    margin-left: -34px;
    transform-origin: bottom center;
    /* 关键:照片入场只淡入,不要用 .reveal 那个会动 transform 的 rise 动画 ——
       否则动画把 transform 归零,扇形旋转/上抬就被盖掉了。 */
    animation-name: photoFadeIn;
  }
  @keyframes photoFadeIn { from { opacity: 0; } to { opacity: 1; } }
  /* First photo has no left overlap */
  .polaroid--photo:first-child { margin-left: 0; }

  /*
    Fan rotation: leftmost = -15°, rightmost = +15°.
    Interpolated values for 2–4 photos:
      1 photo:  0°
      2 photos: -15°, +15°
      3 photos: -15°,  0°, +15°
      4 photos: -15°, -5°, +5°, +15°
    Applied via JS-set data-fan-rot attribute.
  */
  /* 旋转 + 上抬:越靠中间抬得越高 → 扇形(参考图中间那张最高) */
  .polaroid--photo[data-fan-rot="-15"] { transform: translateY(0)    rotate(-15deg); }
  .polaroid--photo[data-fan-rot="-10"] { transform: translateY(-10px) rotate(-10deg); }
  .polaroid--photo[data-fan-rot="-5"]  { transform: translateY(-20px) rotate(-5deg); }
  .polaroid--photo[data-fan-rot="0"]   { transform: translateY(-30px) rotate(0deg); }
  .polaroid--photo[data-fan-rot="5"]   { transform: translateY(-20px) rotate(5deg); }
  .polaroid--photo[data-fan-rot="10"]  { transform: translateY(-10px) rotate(10deg); }
  .polaroid--photo[data-fan-rot="15"]  { transform: translateY(0)    rotate(15deg); }

  /* z-index steps: leftmost lowest, rightmost sits on top */
  .polaroid--photo[data-fan-z="0"] { z-index:1; }
  .polaroid--photo[data-fan-z="1"] { z-index:2; }
  .polaroid--photo[data-fan-z="2"] { z-index:3; }
  .polaroid--photo[data-fan-z="3"] { z-index:4; }

  /* Video polaroid: own row, slight tilt, same warm shadow */
  .polaroid--video {
    width: min(320px, 88vw);
    padding: 20px 20px 46px;   /* 内边距加大 → 更宽的白边相框 */
    transform: rotate(2deg);
    transform-origin: bottom center;
  }
  /* 视频与下方信文之间多留呼吸空间,不要贴在一起 */
  .polaroid-wrap.d1v { margin-bottom: 48px; }

  /* The photo/video window — 4:5 aspect ratio */
  .polaroid-window {
    position: relative;
    width: 100%;
    aspect-ratio: 4 / 5;
    overflow: hidden;
    background: var(--surface);
  }

  /* Subtle film-grain overlay for vintage warmth */
  .polaroid-window::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/></svg>");
    mix-blend-mode: overlay;
    opacity: 0.18;
  }

  /* The actual image inside the window */
  .polaroid-media {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: saturate(0.88) sepia(0.1) contrast(0.92) brightness(1.02);
  }

  /* Video element inside the window */
  .polaroid-media--video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: saturate(0.88) sepia(0.1) contrast(0.92) brightness(1.02);
  }

  /* Narrow screens: keep the prints as ONE fanned row — never wrap into a
     scattered stack. Each print's width scales with the photo count (--n, set
     in JS) so 1–4 prints always fit the viewport; overlap is a fixed 20% of
     the print width. Raised to 600px because 3 prints at the desktop 170px size
     already overflow below ~470px and 4 below ~600px. */
  @media (max-width: 600px) {
    .photo-strip { flex-wrap: nowrap; padding-left: 10px; padding-right: 10px; }
    .polaroid--photo {
      --w: min(168px, calc(96vw / (var(--n, 3) * 0.8 + 0.2)));
      width: var(--w);
      margin-left: calc(var(--w) * -0.2);
      padding: 2.2vw 2.2vw 5vw;
    }
    .polaroid--photo:first-child { margin-left: 0; }
  }

  /* ── Scattered pile (5–10 photos) ──
     A fan of ten prints is a mess; a loose pile reads like a box of memories
     tipped onto the paper. Flex-wrap + per-print tilt/jitter (set inline by JS)
     + negative margins so neighbours and rows tuck under one another. z-index
     rises with index so later prints sit on top — a layered stack, not a grid. */
  .photo-pile {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    max-width: 600px;
    margin: 56px auto 0;
    padding: 22px 14px 38px;
    overflow: visible;
  }
  .polaroid--pile {
    width: min(176px, 30%);
    margin: -10px -14px;            /* neighbours + rows overlap into a pile */
    padding: 10px 10px 26px;
    transform-origin: center;
    animation-name: photoFadeIn;    /* opacity-only: keep the inline tilt intact */
  }
  @media (max-width: 600px) {
    .photo-pile { max-width: 100%; padding: 18px 8px 32px; }
    /* Exactly 2 per row: the 3rd print's margin-box clears the viewport by a wide
       margin so flexbox wraps cleanly (never crams 3 and clips the right edge). */
    .polaroid--pile { width: min(158px, 45%); margin: -8px -6px; padding: 8px 8px 20px; }
  }

  /* ── Ambient music toggle (opt-in) ──
     浏览器禁止自动出声,所以做成一个安静的小按钮:点一下才播放。
     默认隐藏,信加载成功后由 JS 显示;音乐文件缺失则保持隐藏(不留破图)。 */
  .music-toggle {
    position: fixed;
    bottom: 22px;
    right: 22px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1px solid rgba(87,32,7,.22);
    background: #FFFDF8;
    color: var(--wax);
    display: none;                      /* JS 加 .show 才出现 */
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 50;
    box-shadow: 0 2px 10px rgba(87,32,7,.14);
    -webkit-tap-highlight-color: transparent;  /* 手机点击不闪灰块 */
    transition: transform .2s ease, box-shadow .2s ease;
  }
  .music-toggle.show { display: flex; }
  .music-toggle:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(87,32,7,.18); }
  /* 还没点过时,温柔呼吸一下作邀请;点一次后移除 */
  .music-toggle.hint { animation: musicPulse 2.6s ease-in-out infinite; }
  @keyframes musicPulse {
    0%, 100% { box-shadow: 0 2px 10px rgba(87,32,7,.14); }
    50%      { box-shadow: 0 2px 10px rgba(87,32,7,.14), 0 0 0 8px rgba(178,107,36,.10); }
  }
  .music-toggle svg { width: 20px; height: 20px; display: block; }
  /* Show note icon (invite) when paused; show waveform when playing */
  .music-toggle .ico-on  { display: none; }
  .music-toggle.playing .ico-on  { display: block; }
  .music-toggle.playing .ico-off { display: none; }

  /* ── 2×2 grid (exactly 4 photos) ──
     Two even columns, same polaroid frames as the fan strip but
     straightened with only a tiny alternating tilt for life. */
  .photo-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    justify-items: center;
    align-items: center;
    max-width: 420px;
    margin: 46px auto 0;
    padding: 12px 16px 28px;
    overflow: visible;
  }
  .polaroid--grid {
    width: min(170px, 44vw);
    padding: 12px 12px 30px;
    transform-origin: center;
    animation-name: photoFadeIn; /* opacity-only — keeps inline tilt intact */
  }
  /* Tiny alternating tilts — well within the ≤1.5 deg spec */
  .polaroid--grid:nth-child(odd)  { transform: rotate(-1deg); }
  .polaroid--grid:nth-child(even) { transform: rotate(1.5deg); }
  @media (max-width: 480px) {
    .photo-grid { gap: 12px; max-width: 100%; padding: 10px 10px 20px; }
    .polaroid--grid { width: min(148px, 42vw); padding: 8px 8px 20px; }
  }

  /* ── Clickable polaroids: zoom cursor on pointer devices ── */
  @media (hover: hover) {
    .polaroid--photo,
    .polaroid--pile,
    .polaroid--grid { cursor: zoom-in; }
  }

  /* ── Hover lift — only when pointer hover is available AND motion is OK ──
     translateY -4px + rotate → 0 (straightens any tilt), 180ms ease.
     REVIEW FIX (adversarial review): never override transform on hover — fan
     photos carry positional translateY (-20/-30px) and pile photos carry inline
     jitter; a forced translateY(-4px) would DROP the raised middle print 26px
     and oscillate under the cursor. The lift is expressed with shadow + stacking
     only: zero transform = zero flicker. z-index !important beats the pile's
     inline z-index so the hovered print rises above its neighbours. */
  @media (hover: hover) and (prefers-reduced-motion: no-preference) {
    .polaroid--photo:hover,
    .polaroid--pile:hover,
    .polaroid--grid:hover {
      z-index: 30 !important;
      box-shadow:
        0 4px 16px rgba(102,79,54,.14),
        0 16px 36px rgba(102,79,54,.18),
        0 32px 64px rgba(102,79,54,.12);
      /* 180ms ease for hover-in; base .polaroid transition handles hover-out */
      transition: box-shadow 180ms ease !important;
    }
  }

  /* ── Lightbox ── */
  .lb-scrim {
    position: fixed;
    inset: 0;
    background: rgba(43,34,26,0.82);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: lbFadeIn 160ms ease forwards;
  }
  @keyframes lbFadeIn { from { opacity: 0; } to { opacity: 1; } }

  .lb-img {
    max-width: 90vw;
    max-height: 82vh;
    object-fit: contain;
    /* Subtle paper border matching the polaroid white frame */
    border: 10px solid #FFFDF8;
    border-radius: 1px;
    box-shadow: 0 8px 32px rgba(0,0,0,.38);
    display: block;
  }

  /* Top-right control pills: Download + Close */
  .lb-controls {
    position: absolute;
    top: 16px;
    right: 16px;
    display: flex;
    gap: 10px;
    z-index: 1;
  }
  .lb-btn {
    height: 44px;          /* 44px touch target */
    min-width: 44px;
    padding: 0 18px;
    border-radius: 22px;
    border: 1px solid rgba(91,70,56,.22);
    background: #F4EEE4;   /* ivory */
    color: #5B4638;         /* warm brown */
    font-family: 'Courier Prime', monospace;
    font-size: 13px;
    letter-spacing: .05em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: background .15s ease;
  }
  .lb-btn:hover { background: #FFFDF8; }

  /* Skip hover lift and lightbox fade for users who prefer reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .lb-scrim { animation: none; }
  }
</style>
</head>
<body>
  <main class="wrap" id="root">
    <p class="state" id="state">Opening…</p>
  </main>

  <!-- 环境配乐:故意做成"点一下才放"——手机和电脑的浏览器都禁止网页自动出声。
       audio 放在 #root 外面,所以 main() 重写 #root.innerHTML 时不会被清掉。
       loop = 循环;preload="auto" = 提前下好,点了就立刻响。 -->
  <audio id="music" loop preload="auto">
    <source src="assets/music.mp3" type="audio/mpeg" />
  </audio>
  <button class="music-toggle" id="musicBtn" type="button" aria-label="Play ambient music">
    <!-- 暂停时:音符(邀请点击) -->
    <svg class="ico-off" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M9 18V5l11-2v13" />
      <circle cx="6" cy="18" r="3" />
      <circle cx="17" cy="16" r="3" />
    </svg>
    <!-- 播放时:声波 -->
    <svg class="ico-on" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M4 10v4M8 7v10M12 4v16M16 7v10M20 10v4" />
    </svg>
  </button>

  <script>
    // 这两个都是公开值(anon key 本就随 app 公开),放这里安全。
    const SUPABASE_URL = 'https://vxvgcozpuerrjtoxwumi.supabase.co';
    const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4dmdjb3pwdWVycmp0b3h3dW1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzAyODQsImV4cCI6MjA5Njg0NjI4NH0.POL88HDZCOubSx-2b-i0HBP3CK7Sn72TZRzeKz-nuhk';

    function getToken() {
      const h = new URLSearchParams(location.hash.slice(1));
      return h.get('token') || new URLSearchParams(location.search).get('token');
    }
    function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
    // 只信任我们自己 Supabase 存储桶的链接,别的一律不渲染(纵深防御:就算 esc 漏了也挡得住)。
    function safeMediaUrl(u) { return (typeof u === 'string' && u.indexOf(SUPABASE_URL + '/storage/') === 0) ? u : null; }
    function fmtDate(d) {
      try { return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }); }
      catch (e) { return d; }
    }
    // 「写信那一刻」:把封信时间戳 sealedAt 换算成写信人当时的本地时间显示,
    // 例如 "June 9, 2026 · 1:54 PM"。tz 是写信人当时的时区(IANA,如 "Europe/London")。
    // 任何一步缺失/无效 → 退回只显示送达日(fallbackDate),绝不让上方那行空着或报错。
    function fmtWritten(sealedAt, tz, fallbackDate) {
      if (!sealedAt) return fmtDate(fallbackDate);
      try {
        var d = new Date(sealedAt);
        if (isNaN(d.getTime())) return fmtDate(fallbackDate);
        var dOpts = { year: 'numeric', month: 'long', day: 'numeric' };
        var tOpts = { hour: 'numeric', minute: '2-digit' };
        if (tz) { dOpts.timeZone = tz; tOpts.timeZone = tz; }  // 无效时区会抛错 → 下面 catch 兜底
        return d.toLocaleDateString('en-US', dOpts) + ' · ' + d.toLocaleTimeString('en-US', tOpts);
      } catch (e) {
        return fmtDate(fallbackDate);
      }
    }

    // photo_url now holds a JSON array string of URLs (up to 4), e.g.
    //   '["https://...photo-0.jpg","https://...photo-1.jpg"]'
    // For backward-compat it might still be a single plain URL string, or null.
    // Returns an array of URLs that pass the safeMediaUrl() storage-bucket guard,
    // so XSS protection stays exactly as strong as before.
    function parsePhotoUrls(value) {
      if (!value) return [];
      var list;
      try {
        var parsed = JSON.parse(value);
        list = Array.isArray(parsed) ? parsed : [value];
      } catch (e) {
        // Not JSON — treat the raw value as one old-style single URL.
        list = [value];
      }
      var out = [];
      for (var i = 0; i < list.length; i++) {
        var safe = safeMediaUrl(list[i]); // only our own Supabase storage links survive
        if (safe) out.push(safe);
      }
      return out;
    }

    /*
      Compute the fan rotation angle for each photo in a group of `total` photos.
      Leftmost = -15°, rightmost = +15°, interpolated linearly in between.
      Snapped to the nearest 5° so we can use a small set of attribute-driven CSS rules.
        1 photo  →  [0]
        2 photos →  [-15, 15]
        3 photos →  [-15, 0, 15]
        4 photos →  [-15, -5, 5, 15]
    */
    function fanAngles(total) {
      if (total === 1) return [0];
      var out = [];
      for (var i = 0; i < total; i++) {
        var raw = -15 + (30 / (total - 1)) * i;
        // Round to nearest 5 so our CSS attribute selectors match cleanly
        out.push(Math.round(raw / 5) * 5);
      }
      return out;
    }

    // Build a Polaroid block for a photo URL.
    // `index` controls fan rotation + z-index + stagger animation.
    // `total` is how many photos there are in this strip.
    // Returns an HTML string, or '' if url is falsy.
    // SECURITY: every URL goes through esc() AND has already passed safeMediaUrl() via parsePhotoUrls().
    // `pile` = true for 5–10 photos (scattered-pile layout).
    // `grid` = true for exactly 4 photos (2x2 grid layout).
    // data-photo-index carries the integer array index so the lightbox closure
    // can look up the URL from the already-validated safeUrls array — NEVER
    // read back from a DOM attribute as a URL.
    function photoPolaroid(url, index, total, pile, grid) {
      if (!url) return '';
      var safe = esc(url);          // XSS guard: attribute injection prevention
      var pClass = 'p' + index;     // animation stagger: p0…p9
      var win =
        '<div class="polaroid-window">' +
          '<img class="polaroid-media" src="' + safe + '" alt="A memory you sealed with this letter" />' +
        '</div>';
      if (pile) {
        // Deterministic tilt + vertical jitter by index — looks tossed, not gridded,
        // and stays identical on every reload (no Math.random).
        var tilts = [-6, 4, -3, 7, -8, 3, -5, 6, -2, 5];
        var jitter = [0, -9, 7, -4, 9, -6, 4, -10, 2, -3];
        var rot = tilts[index % tilts.length];
        var ty = jitter[index % jitter.length];
        return (
          '<figure class="polaroid polaroid--pile reveal ' + pClass + '"' +
            ' data-photo-index="' + index + '"' +
            ' style="transform: rotate(' + rot + 'deg) translateY(' + ty + 'px); z-index:' + (index + 1) + ';">' +
            win +
          '</figure>'
        );
      }
      if (grid) {
        // 2x2 grid (exactly 4 photos): tiny alternating tilts come from CSS
        // nth-child rules — no inline transform needed here.
        return (
          '<figure class="polaroid polaroid--grid reveal ' + pClass + '"' +
            ' data-photo-index="' + index + '">' +
            win +
          '</figure>'
        );
      }
      // Fan (1–3 photos): leftmost −15° … rightmost +15°, overlapping.
      var angles = fanAngles(total);
      var rotF = angles[index] || 0;
      return (
        '<figure class="polaroid polaroid--photo reveal ' + pClass + '"' +
          ' data-fan-rot="' + rotF + '"' +
          ' data-fan-z="' + index + '"' +
          ' data-photo-index="' + index + '"' +
          ' style="z-index:' + (index + 1) + ';">' +
          win +
        '</figure>'
      );
    }

    // Build a Polaroid block for a video URL.
    // Returns an HTML string, or '' if url is falsy.
    // SECURITY: url must be the return value of safeMediaUrl(); then also esc()'d here.
    function videoPolaroid(url) {
      if (!url) return '';
      var safe = esc(url);          // XSS guard
      return (
        '<div class="polaroid-wrap reveal d1v">' +
          '<figure class="polaroid polaroid--video">' +
            '<div class="polaroid-window">' +
              // src carries a #t=0.1 media fragment: iOS Safari (and others) seek to that
              // frame and paint it as the poster, so the video shows a real captured frame
              // instead of a blank box — no separate poster image / server work needed.
              '<video class="polaroid-media polaroid-media--video" src="' + safe + '#t=0.1" controls preload="metadata" playsinline>' +
                'Your browser does not support HTML5 video.' +
              '</video>' +
            '</div>' +
          '</figure>' +
        '</div>'
      );
    }

    // 环境配乐:点一下播放/暂停,带温柔的音量淡入淡出。
    // 信加载成功后才调用(见 main 末尾),所以按钮只在能读到信时才出现。
    function initMusic() {
      var audio = document.getElementById('music');
      var btn = document.getElementById('musicBtn');
      if (!audio || !btn) return;

      // 音乐文件加载失败(没放 music.mp3 / 路径错)→ 永远不显示这个按钮,不留破图。
      audio.addEventListener('error', function () { btn.classList.remove('show', 'hint'); });

      var targetVol = 0.55;   // 轻柔,绝不吵
      var fadeTimer = null;

      // ⚠️ iOS(含 iPhone 上的 Chrome —— 内核都是 Safari/WebKit)会忽略对 audio.volume 的写入,
      // 音量永远锁在 1。所以淡入只是"锦上添花",绝不能让"暂停/播放"去依赖音量到没到位。
      // 否则 iOS 上淡出永远到不了 0,pause() 永远不执行 = 卡在播放、点了没反应(就是这个 bug)。
      // 修复:① 暂停立刻执行,不等淡出;② 淡入按"固定步数"结束,改不动音量也能自然收尾。
      function fadeIn() {
        if (fadeTimer) { clearInterval(fadeTimer); fadeTimer = null; }
        var steps = 16, i = 0;
        audio.volume = 0;                 // 能改动的平台:从 0 渐起;iOS:忽略(锁 1),照样能播
        fadeTimer = setInterval(function () {
          i++;
          var v = targetVol * (i / steps);
          audio.volume = v > 1 ? 1 : v;   // iOS 忽略写入,但无害
          if (i >= steps) { clearInterval(fadeTimer); fadeTimer = null; }
        }, 45);
      }

      btn.classList.add('show', 'hint');

      btn.addEventListener('click', function () {
        btn.classList.remove('hint');   // 点过一次就不再呼吸提示
        if (audio.paused) {
          // ── 播放 ──(play() 同步把 paused 置 false,所以连点也能正确切换)
          var p = audio.play();
          // play() 返回 Promise;手机上若手势/加载有问题会 reject,catch 掉回到暂停外观。
          if (p && p.catch) {
            p.catch(function () { btn.classList.remove('playing'); });
          }
          btn.classList.add('playing');
          btn.setAttribute('aria-label', 'Pause ambient music');
          fadeIn();
        } else {
          // ── 暂停:立刻停,不依赖淡出回调(保证 iOS 也能停) ──
          if (fadeTimer) { clearInterval(fadeTimer); fadeTimer = null; }
          audio.pause();
          btn.classList.remove('playing');
          btn.setAttribute('aria-label', 'Play ambient music');
        }
      });
    }

    // Lightbox for photo polaroids.
    //
    // SECURITY contract (hard requirement):
    //   - `safeUrls` is the already-validated array from parsePhotoUrls() — every
    //     entry has passed safeMediaUrl() before reaching here.
    //   - The lightbox img.src is set via direct property assignment from
    //     safeUrls[idx] — NEVER via innerHTML interpolation and NEVER by reading
    //     a URL back from a DOM attribute.
    //   - The integer `data-photo-index` attribute is only used as an array index
    //     into safeUrls; it is bounds-checked before use.
    //   - All interactive elements are built with createElement + textContent;
    //     no innerHTML is used inside this function.
    function setupLightbox(safeUrls) {
      if (!safeUrls || !safeUrls.length) return;
      var root = document.getElementById('root');
      if (!root) return;

      function openLightbox(url, idx) {
        if (document.querySelector('.lb-scrim')) return; // already open

        // Lock body scroll while lightbox is visible
        // REVIEW FIX: html 是真正的视口滚动容器(html 有 overflow-x:hidden → body 不再传播)。两个都锁。
        document.documentElement.style.overflow = 'hidden';
        document.body.style.overflow = 'hidden';
        var prevFocus = document.activeElement;

        // Scrim — warm-dark overlay
        var scrim = document.createElement('div');
        scrim.className = 'lb-scrim';
        scrim.setAttribute('role', 'dialog');
        scrim.setAttribute('aria-modal', 'true');
        scrim.setAttribute('aria-label', 'Photo viewer');

        // Enlarged photo — src assigned via property, not innerHTML
        var img = document.createElement('img');
        img.className = 'lb-img';
        img.alt = 'Memory ' + (idx + 1) + ' of ' + safeUrls.length;
        img.src = url; // already passed safeMediaUrl() — safe to assign directly

        // Controls row: Download + Close
        var controls = document.createElement('div');
        controls.className = 'lb-controls';

        // Download button: fetch → blob → objectURL → temporary <a download> → revoke.
        // Falls back to window.open() if the cross-origin fetch fails.
        var dlBtn = document.createElement('button');
        dlBtn.className = 'lb-btn';
        dlBtn.type = 'button';
        dlBtn.setAttribute('aria-label', 'Download this photo');
        dlBtn.textContent = 'Download';
        dlBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          fetch(url)
            .then(function (r) { return r.blob(); })
            .then(function (blob) {
              var objUrl = URL.createObjectURL(blob);
              var a = document.createElement('a');
              a.href = objUrl;
              // 扩展名从 blob 的真实类型推断(png/webp 不再被硬写成 jpg)
              var ext = (blob.type && blob.type.indexOf('/') > -1) ? blob.type.split('/')[1].replace('jpeg', 'jpg') : 'jpg';
              a.download = 'reunite-photo-' + (idx + 1) + '.' + ext;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              URL.revokeObjectURL(objUrl);
            })
            .catch(function () {
              // Cross-origin fetch blocked — open in new tab as fallback
              // 兜底:同步构造带 noopener 的链接跳转(popup 拦截下也更稳)
              var fa = document.createElement('a');
              fa.href = url; fa.target = '_blank'; fa.rel = 'noopener';
              document.body.appendChild(fa); fa.click(); fa.remove();
            });
        });

        // Close button
        var closeBtn = document.createElement('button');
        closeBtn.className = 'lb-btn';
        closeBtn.type = 'button';
        closeBtn.setAttribute('aria-label', 'Close photo viewer');
        closeBtn.textContent = '✕'; // ✕

        function close() {
          document.removeEventListener('keydown', keyHandler);
          document.documentElement.style.overflow = '';
          document.body.style.overflow = '';
          if (scrim.parentNode) scrim.parentNode.removeChild(scrim);
          // Restore focus to the polaroid that triggered the lightbox
          if (prevFocus && prevFocus.focus) prevFocus.focus();
        }

        closeBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          close();
        });

        controls.appendChild(dlBtn);
        controls.appendChild(closeBtn);
        scrim.appendChild(img);
        scrim.appendChild(controls);
        document.body.appendChild(scrim);

        // Focus the close button immediately for keyboard users
        closeBtn.focus();

        // Click on the dark scrim background (not the image/controls) closes
        scrim.addEventListener('click', function (e) {
          if (e.target === scrim) close();
        });

        // Esc 关闭;Tab 在弹层的两个按钮间循环(简易焦点圈,不逃到背景页)
        function keyHandler(e) {
          if (e.key === 'Escape') { close(); return; }
          if (e.key === 'Tab') {
            e.preventDefault();
            if (document.activeElement === dlBtn) { closeBtn.focus(); } else { dlBtn.focus(); }
          }
        }
        document.addEventListener('keydown', keyHandler);
      }

      // Single delegated listener on root covers all three photo polaroid types
      function activateFrom(e) {
        var fig = e.target.closest('.polaroid--photo, .polaroid--pile, .polaroid--grid');
        if (!fig) return;
        var idx = parseInt(fig.getAttribute('data-photo-index'), 10);
        // Bounds-check the index before using it as an array subscript
        if (isNaN(idx) || idx < 0 || idx >= safeUrls.length) return;
        openLightbox(safeUrls[idx], idx);
      }
      root.addEventListener('click', activateFrom);
      // REVIEW FIX: 键盘也能打开(Enter/Space);配合下方为照片补上的 tabindex/role
      root.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
          var fig = e.target && e.target.closest && e.target.closest('.polaroid--photo, .polaroid--pile, .polaroid--grid');
          if (fig) { e.preventDefault(); activateFrom(e); }
        }
      });
      // 照片 figure 可聚焦 + 语义化(打开大图的按钮)
      var figs = root.querySelectorAll('.polaroid--photo, .polaroid--pile, .polaroid--grid');
      for (var fi = 0; fi < figs.length; fi++) {
        figs[fi].setAttribute('tabindex', '0');
        figs[fi].setAttribute('role', 'button');
        figs[fi].setAttribute('aria-label', 'View photo ' + (fi + 1) + ' full size');
      }
    }

    async function main() {
      const token = getToken();
      const root = document.getElementById('root');
      const state = document.getElementById('state');
      if (!token) { state.textContent = 'This link is missing its key.'; return; }
      try {
        const res = await fetch(SUPABASE_URL + '/rest/v1/rpc/reveal_letter', {
          method: 'POST',
          headers: { apikey: ANON, Authorization: 'Bearer ' + ANON, 'Content-Type': 'application/json' },
          body: JSON.stringify({ p_token: token }),
        });
        const rows = await res.json();
        if (!Array.isArray(rows) || rows.length === 0) {
          state.textContent = 'This letter is not ready yet, or the link is no longer valid.';
          return;
        }
        const letter = rows[0];

        // photo_url may be a JSON array (up to 4), an old single URL, or null.
        // parsePhotoUrls() already runs every URL through safeMediaUrl().
        const photoUrls = parsePhotoUrls(letter.photo_url);

        // Build the photo layout container.
        // Layout rules by count:
        //   1–3  → overlapping fan strip  (.photo-strip)
        //   4    → tidy 2x2 grid          (.photo-grid)
        //   5–10 → scattered pile         (.photo-pile)
        const pile = photoUrls.length >= 5;
        const grid = photoUrls.length === 4;
        const photoHtml = photoUrls.length > 0
          ? '<div class="' + (pile ? 'photo-pile' : grid ? 'photo-grid' : 'photo-strip') + '" style="--n:' + photoUrls.length + '">' +
              photoUrls.map(function(u, i) { return photoPolaroid(u, i, photoUrls.length, pile, grid); }).join('') +
            '</div>'
          : '';

        // video_url stays a single URL — guard it the same as before.
        const videoUrl = safeMediaUrl(letter.video_url);
        const videoHtml = videoPolaroid(videoUrl);

        // Pace the letter body: if photos/video sit above it, keep the slow d3 beat
        // so the words land after the media. If it's a text-only letter, bring the
        // body in earlier (dtext) so the reader isn't left staring at an empty page.
        const hasMedia = photoUrls.length > 0 || !!videoUrl;
        const tailClass = hasMedia ? 'd3' : 'dtext';

        root.innerHTML =
          // ── Splash header ──
          '<div class="header">' +
            '<div class="header-seal reveal s0">' +
              '<img src="assets/seal-stamp.png" alt="Reunite seal" />' +
            '</div>' +
            '<div class="header-wordmark reveal d1">' +
              '<img src="assets/wordmark.svg" alt="Reunite" />' +
            '</div>' +
            '<p class="header-tagline reveal d1a">A letter from someone who once was you.</p>' +
            '<div class="header-divider reveal d1b">' +
              '<img src="assets/divider.svg" alt="" aria-hidden="true" />' +
            '</div>' +
            '<p class="deliver-date reveal d1c">' + esc(fmtWritten(letter.sealed_at, letter.deliver_tz, letter.deliver_on)) + '</p>' +
          '</div>' +
          // ── Photos ──
          photoHtml +
          // ── Video ──
          videoHtml +
          // ── Letter body, on its own sheet of paper ──
          '<div class="letter-paper reveal ' + tailClass + '">' +
            '<div class="body">' + esc(letter.body) + '</div>' +
          '</div>' +
          '<div class="star reveal ' + tailClass + '">&#10022;</div>';

        // If a photo fails to load (storage object missing / expired), hide that
        // print gracefully instead of leaving a broken-image box — same "no broken
        // art" rule as the music button. Belt-and-braces: we also eager-load now,
        // and we catch images that already failed before this listener attached.
        var pImgs = root.querySelectorAll('img.polaroid-media');
        Array.prototype.forEach.call(pImgs, function (img) {
          function hide() {
            var fig = img.closest('.polaroid');
            if (fig) fig.style.display = 'none';
          }
          if (img.complete && img.naturalWidth === 0) hide();
          else img.addEventListener('error', hide);
        });

        // Letter loaded — show music button (gentle invite).
        initMusic();
        // Attach lightbox to all photo polaroids now that the DOM is built.
        // Passes the already-validated URL array so the lightbox never needs
        // to read a URL back from the DOM.
        setupLightbox(photoUrls);

      } catch (e) {
        state.textContent = 'Something went wrong opening this letter.';
      }
    }
    main();
  </script>
</body>
</html>
